<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Принтери — Філамент CLOUD</title>
<style>
/* Копіюємо всі оригінальні стилі для коректного відображення */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1.5rem; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a1a; }
.toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.toolbar input[type=text] { flex: 1; min-width: 140px; padding: 7px 12px; border: 0.5px solid #ccc; border-radius: 20px; font-size: 14px; background: #fff; outline: none; }
.btn-tool { font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #555; cursor: pointer; white-space: nowrap; }
.btn-tool:hover { background: #f0f0f0; color: #111; }
.btn-green { border-color: #1D9E75; color: #1D9E75; }
.btn-blue { border-color: #378ADD; color: #378ADD; }
.btn-orange { border-color: #EF9F27; color: #EF9F27; }
.cloud-config { background: #fff; border: 1px dashed #EF9F27; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
.cloud-config input { width: 100%; margin-bottom: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; padding-bottom: 2rem; }
.card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1D9E75; color: #fff; padding: 8px 20px; border-radius: 20px; opacity: 0; transition: opacity .3s; z-index: 300; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.error { background: #E24B4A; }
.settings-panel { display: none; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
.settings-panel.open { display: block; }
/* ... інші стилі з оригіналу ... */
.bar-track { height: 6px; background: #eee; border-radius: 20px; overflow: hidden; margin-top: 4px; }
.bar-fill { height: 100%; border-radius: 20px; }
</style>
</head>
<body>

<h1>🖨 3D Принтери — Філамент CLOUD</h1>

<div class="toolbar">
  <input type="text" id="search" placeholder="Пошук за номером або моделлю..."/>
  <button class="btn-tool btn-orange" onclick="loadFromCloud()">🔄 Оновити з хмари</button>
  <button class="btn-tool btn-green" onclick="saveToCloud()">☁️ Зберегти в хмару</button>
  <button class="btn-tool btn-blue" onclick="toggleSettings()">⚙ Налаштування</button>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="cloud-config">
    <h3 style="font-size: 14px; margin-bottom: 10px;">☁️ Налаштування JSONBin.io</h3>
    <input type="text" id="cloud-bin-id" placeholder="Bin ID (напр. 65f1...)">
    <input type="password" id="cloud-api-key" placeholder="X-Master-Key">
    <button class="btn-tool btn-blue" style="width:100%" onclick="saveCloudKeys()">Зберегти ключі та завантажити</button>
  </div>
  <div id="cfg-sections">
    </div>
</div>

<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<script>
let printers = [], CFG = {}, savedAt = null;
const LS_KEY = 'filament_cloud_local';

function showToast(m, isErr=false) { 
  const t=document.getElementById('toast'); 
  t.textContent=m; t.className = 'toast show' + (isErr?' error':'');
  setTimeout(()=>t.classList.remove('show'), 3000); 
}

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }

// ВИПРАВЛЕНА ФУНКЦІЯ (якої бракувало)
function saveToStorage() {
  localStorage.setItem(LS_KEY, JSON.stringify({printers, CFG, savedAt}));
}

function saveCloudKeys() {
  const bin = document.getElementById('cloud-bin-id').value.trim();
  const key = document.getElementById('cloud-api-key').value.trim();
  if(bin && key) {
    localStorage.setItem('jsonbin_id', bin);
    localStorage.setItem('jsonbin_key', key);
    loadFromCloud();
  } else {
    showToast('Введіть обидва ключі!', true);
  }
}

async function loadFromCloud() {
  const binId = localStorage.getItem('jsonbin_id');
  const apiKey = localStorage.getItem('jsonbin_key');
  if(!binId || !apiKey) { showToast('Налаштуйте ключі ⚙', true); return; }

  showToast('Синхронізація...');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
      headers: { 'X-Master-Key': apiKey, 'X-Bin-Meta': false }
    });
    if(!res.ok) throw new Error('Помилка доступу');
    const data = await res.json();
    
    printers = data.printers || [];
    CFG = data.cfg || {};
    savedAt = data.savedAt;
    
    saveToStorage();
    renderGrid();
    showToast('Дані оновлено ✅');
  } catch (e) {
    showToast('Помилка API: ' + e.message, true);
  }
}

async function saveToCloud() {
  const binId = localStorage.getItem('jsonbin_id');
  const apiKey = localStorage.getItem('jsonbin_key');
  if(!binId || !apiKey) return;

  showToast('Збереження...');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
      body: JSON.stringify({ printers, cfg: CFG, savedAt: new Date().toISOString() })
    });
    if(res.ok) showToast('Збережено в хмару ☁️');
    else throw new Error();
  } catch (e) { showToast('Не вдалося зберегти', true); }
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = printers.map(p => `
    <div class="card">
      <div style="font-weight:bold; font-size:18px;">#${p.num}</div>
      <div style="font-size:12px; color:#888;">${p.model}</div>
      <div style="margin-top:10px;">${p.color} (${p.mat})</div>
      <div style="font-weight:500; margin-top:5px;">${p.totalG} г</div>
    </div>
  `).join('');
}

window.onload = () => {
  document.getElementById('cloud-bin-id').value = localStorage.getItem('jsonbin_id') || '';
  document.getElementById('cloud-api-key').value = localStorage.getItem('jsonbin_key') || '';
  loadFromCloud();
};
</script>
</body>
</html>
