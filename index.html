<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Filament Tracker Cloud</title>
<style>
/* СТИЛІ: Оригінальний дизайн + адаптивність */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; color: #1a1a1a; padding: 1.5rem; }
.toolbar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
.btn-tool { font-size: 13px; padding: 8px 16px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; cursor: pointer; transition: 0.2s; }
.btn-tool:hover { background: #f0f0f0; }
.btn-green { border-color: #1D9E75; color: #1D9E75; font-weight: bold; }
.btn-orange { border-color: #EF9F27; color: #EF9F27; font-weight: bold; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
.card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1.2rem; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
.edit-btn { position: absolute; top: 12px; right: 12px; background: #f8f8f8; border: 0.5px solid #ddd; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.edit-btn:hover { background: #eee; }
.bar-track { height: 8px; background: #eee; border-radius: 10px; margin-top: 12px; overflow: hidden; }
.bar-fill { height: 100%; transition: width 0.4s ease-out; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 1.5rem; width: 95%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
.field { margin-bottom: 15px; }
.field label { display: block; font-size: 12px; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
.field input:focus { border-color: #1D9E75; }
.toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 24px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 2000; font-size: 14px; }
.toast.show { opacity: 1; }
.settings-panel { display: none; background: #fff; border: 1px solid #EF9F27; border-radius: 12px; padding: 1.2rem; margin-bottom: 1.5rem; }
.settings-panel.open { display: block; }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn-tool btn-orange" onclick="loadFromCloud()">🔄 ОНОВИТИ З ХМАРИ</button>
  <button class="btn-tool btn-green" onclick="saveToCloud()">☁️ ЗБЕРЕГТИ В ХМАРУ</button>
  <button class="btn-tool" onclick="toggleSettings()">⚙️ Ключі</button>
  <button class="btn-tool" onclick="openModal(true)">+ Додати принтер</button>
</div>

<div id="settings-panel" class="settings-panel">
  <h3 style="font-size:14px; margin-bottom:10px;">Налаштування зв'язку (JSONBin.io)</h3>
  <div class="field"><label>Bin ID</label><input type="text" id="cloud-bin-id" placeholder="Напр: 65f..."></div>
  <div class="field"><label>X-Master-Key</label><input type="password" id="cloud-api-key" placeholder="Ваш секретний ключ"></div>
  <button class="btn-tool btn-green" style="width:100%; padding:12px;" onclick="saveCloudKeys()">Зберегти ключі в браузері</button>
</div>

<div id="grid" class="grid"></div>

<div class="modal-overlay" id="overlay">
  <div class="modal">
    <h3 id="modal-title" style="margin-bottom:20px; font-size:18px;">Редагування принтера</h3>
    <div class="field"><label>Номер принтера</label><input type="text" id="edit-num"></div>
    <div class="field"><label>Модель принтера</label><select id="edit-model"></select></div>
    <div class="field"><label>Матеріал</label><select id="edit-mat"></select></div>
    <div class="field"><label>Колір</label><select id="edit-color"></select></div>
    <div class="field"><label>Вага на терезах (г)</label><input type="number" id="edit-grams"></div>
    
    <div style="display:flex; gap:10px; margin-top:25px;">
      <button class="btn-tool" style="flex:1; padding:12px;" onclick="closeModal()">Скасувати</button>
      <button class="btn-tool btn-green" style="flex:1; padding:12px;" onclick="saveEdit()">Зберегти</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ЛОГІКА ПРОГРАМИ */
let printers = [];
let editIdx = null;
let CFG = {
    models: ["Bambu Lab P1S", "Bambu Lab P1P", "Modix 120Z", "Creality K1"],
    mats: ["PG", "TPU 40D", "Полікарбонат", "PETG", "ABS", "ASA"],
    colors: ["білий", "чорний", "червоний", "синій", "зелений", "сірий", "жовтий", "прозорий"]
};

function showToast(m) { 
    const t = document.getElementById('toast'); 
    t.textContent = m; t.classList.add('show'); 
    setTimeout(() => t.classList.remove('show'), 3000); 
}

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }

function saveCloudKeys() {
    localStorage.setItem('jsonbin_id', document.getElementById('cloud-bin-id').value.trim());
    localStorage.setItem('jsonbin_key', document.getElementById('cloud-api-key').value.trim());
    showToast('Ключі збережено! Оновлюю дані...');
    loadFromCloud();
}

async function loadFromCloud() {
    const bid = localStorage.getItem('jsonbin_id'), key = localStorage.getItem('jsonbin_key');
    if(!bid || !key) { toggleSettings(); return showToast('Будь ласка, введіть ключі ⚙️'); }
    
    try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${bid}`, { headers: {'X-Master-Key': key, 'X-Bin-Meta': false }});
        if(!r.ok) throw new Error();
        const d = await r.json();
        printers = d.printers || [];
        if(d.cfg) CFG = d.cfg;
        renderGrid();
        showToast('Дані синхронізовано ✅');
    } catch(e) { showToast('Помилка завантаження. Перевірте ключі.'); }
}

async function saveToCloud() {
    const bid = localStorage.getItem('jsonbin_id'), key = localStorage.getItem('jsonbin_key');
    if(!bid || !key) return showToast('Спочатку введіть ключі!');
    
    showToast('Збереження у хмару...');
    try {
        await fetch(`https://api.jsonbin.io/v3/b/${bid}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json', 'X-Master-Key': key},
            body: JSON.stringify({ printers, cfg: CFG, savedAt: new Date().toISOString() })
        });
        showToast('УСПІШНО ЗБЕРЕЖЕНО! ☁️✓');
    } catch(e) { showToast('Помилка при збереженні'); }
}

function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = printers.map((p, i) => {
        const percent = Math.min(100, Math.max(0, (p.totalG / 3500) * 100)); // 3500г як макс для шкали
        return `
            <div class="card">
                <button class="edit-btn" onclick="openModal(false, ${i})">✏️</button>
                <div style="font-size:22px; font-weight:bold; color:#1a1a1a;">#${p.num}</div>
                <div style="font-size:13px; color:#888; margin-bottom:8px;">${p.model}</div>
                <div style="font-size:15px; font-weight:500;">${p.mat} • ${p.color}</div>
                <div style="font-size:20px; font-weight:bold; color:#1D9E75; margin-top:10px;">${p.totalG} <span style="font-size:14px;">г</span></div>
                <div class="bar-track">
                    <div class="bar-fill" style="width:${percent}%; background:${percent < 15 ? '#E24B4A' : '#1D9E75'}"></div>
                </div>
            </div>
        `;
    }).join('');
}

function openModal(isNew, idx = null) {
    editIdx = idx;
    const p = isNew ? {num:'', model:CFG.models[0], mat:CFG.mats[0], color:CFG.colors[0], totalG:0} : printers[idx];
    
    const fillSelect = (id, list, val) => {
        const s = document.getElementById(id);
        s.innerHTML = list.map(item => `<option value="${item}" ${item===val?'selected':''}>${item}</option>`).join('');
    };
    
    fillSelect('edit-model', CFG.models, p.model);
    fillSelect('edit-mat', CFG.mats, p.mat);
    fillSelect('edit-color', CFG.colors, p.color);
    document.getElementById('edit-num').value = p.num;
    document.getElementById('edit-grams').value = p.totalG;
    
    document.getElementById('modal-title').textContent = isNew ? "Додати принтер" : "Редагувати #" + p.num;
    document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function saveEdit() {
    const newP = {
        num: document.getElementById('edit-num').value.trim(),
        model: document.getElementById('edit-model').value,
        mat: document.getElementById('edit-mat').value,
        color: document.getElementById('edit-color').value,
        totalG: parseInt(document.getElementById('edit-grams').value) || 0
    };
    
    if(!newP.num) return showToast('Вкажіть номер!');

    if(editIdx === null) printers.push(newP);
    else printers[editIdx] = newP;
    
    renderGrid();
    closeModal();
    showToast('Збережено локально. Натисніть "Зберегти в хмару"');
}

window.onload = () => {
    document.getElementById('cloud-bin-id').value = localStorage.getItem('jsonbin_id') || '';
    document.getElementById('cloud-api-key').value = localStorage.getItem('jsonbin_key') || '';
    if(localStorage.getItem('jsonbin_id')) loadFromCloud();
};
</script>
</body>
</html>
