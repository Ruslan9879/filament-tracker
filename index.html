<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Принтери — Філамент</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1.5rem; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a1a; }

.toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.toolbar input[type=text] { flex: 1; min-width: 140px; padding: 7px 12px; border: 0.5px solid #ccc; border-radius: 20px; font-size: 14px; background: #fff; outline: none; }
.toolbar input[type=text]:focus { border-color: #888; }
.btn-tool { font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #555; cursor: pointer; white-space: nowrap; }
.btn-tool:hover { background: #f0f0f0; color: #111; }
.btn-green { border-color: #1D9E75; color: #1D9E75; }
.btn-green:hover { background: #EAF3DE; color: #0F6E56; }
.btn-blue { border-color: #378ADD; color: #378ADD; }
.btn-blue:hover { background: #E6F1FB; color: #185FA5; }

.date-banner { background: #EAF3DE; border: 0.5px solid #C0DD97; border-radius: 8px; padding: 9px 14px; font-size: 13px; color: #3B6D11; margin-bottom: 1rem; display: none; }
.date-banner b { font-weight: 500; }

.stats-row { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
.stat-box { flex: 1; min-width: 80px; background: #fff; border-radius: 8px; padding: 10px 12px; border: 0.5px solid #e0e0e0; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 2px; }
.stat-val { font-size: 20px; font-weight: 500; color: #1a1a1a; }

.filters { display: flex; gap: 8px; flex-wrap: wrap; padding: .5rem 0 1rem; }
.filter-btn { font-size: 13px; padding: 5px 14px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; }
.filter-btn.active { background: #eee; color: #111; border-color: #999; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; padding-bottom: 2rem; }
.card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem; transition: border-color .2s; }
.card:hover { border-color: #bbb; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.printer-num { font-size: 22px; font-weight: 500; line-height: 1; }
.printer-model { font-size: 11px; color: #aaa; margin-top: 2px; }
.edit-btn { font-size: 12px; padding: 3px 9px; border-radius: 20px; border: 0.5px solid #ccc; background: transparent; color: #888; cursor: pointer; }
.edit-btn:hover { background: #f0f0f0; color: #111; }
.del-btn { font-size: 12px; padding: 3px 7px; border-radius: 20px; border: 0.5px solid #f0c0c0; background: transparent; color: #E24B4A; cursor: pointer; margin-left: 4px; }
.del-btn:hover { background: #FCEBEB; }
.card-actions { display: flex; align-items: center; }
.material-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; margin-top: 6px; }
.spool-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; margin-top: 4px; margin-left: 4px; background: #f0f0f0; color: #888; border: 0.5px solid #e0e0e0; }
.color-dot-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.color-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; border: 0.5px solid #ccc; }
.color-name { font-size: 13px; color: #888; }
.bar-wrap { margin-top: 12px; }
.bar-label { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 4px; }
.bar-track { height: 6px; background: #eee; border-radius: 20px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 20px; }
.grams-big { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.grams-pct { font-size: 12px; color: #aaa; margin-left: 3px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1D9E75; color: #fff; font-size: 13px; padding: 8px 20px; border-radius: 20px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 300; }
.toast.show { opacity: 1; }

/* ── Modal shared ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border: 0.5px solid #ccc; border-radius: 12px; padding: 1.5rem; width: 310px; max-width: 94vw; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 500; margin: 0 0 1.25rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 13px; color: #888; margin-bottom: 5px; }
.field select, .field input[type=number], .field input[type=text] { width: 100%; padding: 7px 10px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; outline: none; }
.field input:focus, .field select:focus { border-color: #888; }
.seg { display: flex; border: 0.5px solid #ccc; border-radius: 8px; overflow: hidden; }
.seg button { flex: 1; padding: 7px 4px; font-size: 12px; border: none; background: #fff; color: #666; cursor: pointer; transition: background .15s, color .15s; line-height: 1.3; }
.seg button.active { background: #1a1a1a; color: #fff; }
.seg button:not(:last-child) { border-right: 0.5px solid #ccc; }
.tare-info { font-size: 12px; color: #bbb; margin-top: 4px; }
.calc-hint { font-size: 12px; color: #1D9E75; margin-top: 4px; min-height: 16px; }
.modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
.btn-modal-save { flex: 1; padding: 7px; border-radius: 8px; border: none; background: #1D9E75; color: #fff; font-size: 14px; cursor: pointer; }
.btn-modal-save:hover { background: #0F6E56; }
.btn-modal-cancel { flex: 1; padding: 7px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #666; font-size: 14px; cursor: pointer; }
.btn-modal-cancel:hover { background: #f0f0f0; }

/* ── Settings panel ── */
.settings-panel { display: none; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
.settings-panel.open { display: block; }
.settings-panel h2 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: #1a1a1a; }
.settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
.settings-section h3 { font-size: 12px; color: #888; font-weight: 400; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.tag { display: flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 8px; border-radius: 20px; background: #f5f4f0; border: 0.5px solid #e0e0e0; color: #444; }
.tag .tag-del { background: none; border: none; color: #bbb; cursor: pointer; font-size: 14px; line-height: 1; padding: 0 0 0 2px; }
.tag .tag-del:hover { color: #E24B4A; }
.tag-add-row { display: flex; gap: 6px; }
.tag-add-row input { flex: 1; padding: 5px 8px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13px; outline: none; }
.tag-add-row input:focus { border-color: #888; }
.tag-add-row button { padding: 5px 12px; border-radius: 8px; border: 0.5px solid #1D9E75; background: transparent; color: #1D9E75; font-size: 13px; cursor: pointer; }
.tag-add-row button:hover { background: #EAF3DE; }
/* spool/holder rows in settings */
.item-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.item-row { display: flex; align-items: center; gap: 6px; font-size: 13px; background: #f5f4f0; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 5px 8px; }
.item-row span { flex: 1; }
.item-row .item-del { background: none; border: none; color: #bbb; cursor: pointer; font-size: 14px; }
.item-row .item-del:hover { color: #E24B4A; }
.item-add-row { display: flex; gap: 6px; }
.item-add-row input { flex: 1; padding: 5px 8px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13px; outline: none; min-width: 0; }
.item-add-row input:focus { border-color: #888; }
.item-add-row input[type=number] { width: 70px; flex: none; }
.item-add-row button { padding: 5px 10px; border-radius: 8px; border: 0.5px solid #1D9E75; background: transparent; color: #1D9E75; font-size: 13px; cursor: pointer; }
.item-add-row button:hover { background: #EAF3DE; }
</style>
</head>
<body>

<h1>🖨 3D Принтери — Філамент</h1>

<div class="toolbar">
  <input type="text" id="search" placeholder="Пошук за номером або моделлю..."/>
  <button class="btn-tool btn-green" onclick="openAddPrinter()">+ Принтер</button>
  <button class="btn-tool btn-blue" id="settings-toggle" onclick="toggleSettings()">⚙ Налаштування</button>
  <button class="btn-tool btn-green" onclick="saveJSON()">💾 Зберегти</button>
  <button class="btn-tool" onclick="document.getElementById('file-input').click()">📂 Завантажити</button>
  <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadJSON(event)"/>
</div>

<!-- Settings panel -->
<div class="settings-panel" id="settings-panel">
  <h2>⚙ Налаштування довідників</h2>
  <div class="settings-grid">

    <div class="settings-section">
      <h3>Моделі принтерів</h3>
      <div class="tag-list" id="cfg-models"></div>
      <div class="tag-add-row">
        <input type="text" id="new-model" placeholder="напр. Bambu X1"/>
        <button onclick="addCfgItem('models','new-model','cfg-models')">+ Додати</button>
      </div>
    </div>

    <div class="settings-section">
      <h3>Матеріали</h3>
      <div class="tag-list" id="cfg-mats"></div>
      <div class="tag-add-row">
        <input type="text" id="new-mat" placeholder="напр. PETG"/>
        <button onclick="addCfgItem('mats','new-mat','cfg-mats')">+ Додати</button>
      </div>
    </div>

    <div class="settings-section">
      <h3>Кольори</h3>
      <div class="tag-list" id="cfg-colors"></div>
      <div class="tag-add-row">
        <input type="text" id="new-color" placeholder="напр. помаранчевий"/>
        <button onclick="addCfgItem('colors','new-color','cfg-colors')">+ Додати</button>
      </div>
    </div>

    <div class="settings-section">
      <h3>Котушки (назва · вага г · макс г)</h3>
      <div class="item-list" id="cfg-spools"></div>
      <div class="item-add-row">
        <input type="text" id="new-spool-name" placeholder="Назва"/>
        <input type="number" id="new-spool-w" placeholder="г" min="1"/>
        <input type="number" id="new-spool-max" placeholder="макс г" min="1"/>
        <button onclick="addSpool()">+</button>
      </div>
    </div>

    <div class="settings-section">
      <h3>Тримачі (назва · вага г)</h3>
      <div class="item-list" id="cfg-holders"></div>
      <div class="item-add-row">
        <input type="text" id="new-holder-name" placeholder="Назва"/>
        <input type="number" id="new-holder-w" placeholder="г" min="1"/>
        <button onclick="addHolder()">+</button>
      </div>
    </div>

  </div>
</div>

<div class="date-banner" id="date-banner"></div>
<div class="stats-row" id="stats"></div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<!-- Edit / Add printer modal -->
<div class="modal-overlay" id="overlay">
  <div class="modal">
    <h3 id="modal-title">Принтер</h3>
    <div class="field">
      <label>№ принтера</label>
      <input type="text" id="edit-num" placeholder="напр. 999"/>
    </div>
    <div class="field">
      <label>Модель</label>
      <select id="edit-model"></select>
    </div>
    <div class="field">
      <label>Котушка</label>
      <div class="seg" id="seg-spool"></div>
    </div>
    <div class="field">
      <label>Тримач</label>
      <div class="seg" id="seg-holder"></div>
    </div>
    <div class="field">
      <label>Матеріал</label>
      <select id="edit-mat"></select>
    </div>
    <div class="field">
      <label>Колір</label>
      <select id="edit-color"></select>
    </div>
    <div class="field">
      <label>Загальна вага на терезах (г)</label>
      <input type="number" id="edit-grams" min="0" max="9999" step="1" placeholder="напр. 1500"/>
      <div class="tare-info" id="tare-info"></div>
      <div class="calc-hint" id="calc-hint"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeModal()">Скасувати</button>
      <button class="btn-modal-save" id="modal-save-btn" onclick="saveEdit()">Зберегти</button>
    </div>
  </div>
</div>

<script>
/* ── Default config ── */
let CFG = {
  models:  ['Modix 120Z','Creality K1','Bambu Lab P1S','Bambu Lab P1P'],
  mats:    ['PG','TPU 40D','Полікарбонат','PETG','ABS','ASA'],
  colors:  ['чорний','білий','темно-сірий','прозорий','червоний','синій','жовтий','зелений','сірий'],
  spools:  [
    {id:'large', label:'Велика · 650 г', weight:650, maxNet:3000},
    {id:'small',  label:'Мала · 250 г',  weight:250, maxNet:750},
  ],
  holders: [
    {id:'stand',  label:'Стійка · 215 г', weight:215},
    {id:'roller', label:'Ролики · 300 г', weight:300},
  ],
};

/* ── Helpers ── */
function spoolById(id)  { return CFG.spools.find(s=>s.id===id)  || CFG.spools[0]; }
function holderById(id) { return CFG.holders.find(h=>h.id===id) || CFG.holders[0]; }
function getTare(spoolId, holderId) { return spoolById(spoolId).weight + holderById(holderId).weight; }
function getMaxNet(spoolId) { return spoolById(spoolId).maxNet; }
function netG(totalG, spoolId, holderId)  { return Math.max(0, totalG - getTare(spoolId, holderId)); }
function pctOf(totalG, spoolId, holderId) { return Math.min(100, Math.round(netG(totalG,spoolId,holderId)/getMaxNet(spoolId)*100)); }
function barColor(pct) { return pct>=75?'#1D9E75':pct>=40?'#EF9F27':'#E24B4A'; }
function fmtDT(iso) {
  if(!iso) return '—';
  const d=new Date(iso), p=n=>String(n).padStart(2,'0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

const colorDots = {
  'чорний':'#222','білий':'#e8e8e8','темно-сірий':'#555',
  'прозорий':'repeating-linear-gradient(45deg,#ccc 0,#ccc 3px,#fff 3px,#fff 6px)',
  'червоний':'#E24B4A','синій':'#378ADD','жовтий':'#EF9F27','зелений':'#1D9E75','сірий':'#888',
  'помаранчевий':'#F97316',
};
const matColors = {
  'PG':{bg:'#E6F1FB',text:'#0C447C'},'TPU 40D':{bg:'#FAEEDA',text:'#633806'},
  'Полікарбонат':{bg:'#EAF3DE',text:'#27500A'},'PETG':{bg:'#FBEAF0',text:'#72243E'},
  'ABS':{bg:'#EEEDFE',text:'#3C3489'},'ASA':{bg:'#FAECE7',text:'#712B13'},
  'PETG':{bg:'#FBEAF0',text:'#72243E'},
};
function matColor(mat) { return matColors[mat]||{bg:'#F1EFE8',text:'#2C2C2A'}; }

function totalFromPct(pct,spoolId,holderId){
  return Math.round(getMaxNet(spoolId)*pct/100)+getTare(spoolId,holderId);
}

/* ── Data ── */
const DEFAULT_PRINTERS = [
  {id:genId(),num:'85',  model:'Modix 120Z',    mat:'PG',           color:'чорний',     spoolId:'large',holderType:'stand',totalG:totalFromPct(100,'large','stand')},
  {id:genId(),num:'176', model:'Creality K1',   mat:'TPU 40D',      color:'чорний',     spoolId:'large',holderType:'stand',totalG:totalFromPct(85, 'large','stand')},
  {id:genId(),num:'185', model:'Modix 120Z',    mat:'PG',           color:'чорний',     spoolId:'large',holderType:'stand',totalG:totalFromPct(100,'large','stand')},
  {id:genId(),num:'192', model:'Modix 120Z',    mat:'PG',           color:'чорний',     spoolId:'large',holderType:'stand',totalG:totalFromPct(33, 'large','stand')},
  {id:genId(),num:'198', model:'Bambu Lab P1S', mat:'PG',           color:'білий',      spoolId:'large',holderType:'stand',totalG:totalFromPct(50, 'large','stand')},
  {id:genId(),num:'203', model:'Bambu Lab P1S', mat:'PG',           color:'темно-сірий',spoolId:'large',holderType:'stand',totalG:totalFromPct(80, 'large','stand')},
  {id:genId(),num:'286', model:'Creality K1',   mat:'PG',           color:'чорний',     spoolId:'large',holderType:'stand',totalG:totalFromPct(33, 'large','stand')},
  {id:genId(),num:'378', model:'Modix 120Z',    mat:'PG',           color:'прозорий',   spoolId:'large',holderType:'stand',totalG:totalFromPct(33, 'large','stand')},
  {id:genId(),num:'404', model:'Bambu Lab P1P', mat:'PG',           color:'білий',      spoolId:'large',holderType:'stand',totalG:totalFromPct(100,'large','stand')},
  {id:genId(),num:'507', model:'Bambu Lab P1P', mat:'PG',           color:'прозорий',   spoolId:'large',holderType:'stand',totalG:totalFromPct(50, 'large','stand')},
  {id:genId(),num:'508', model:'Creality K1',   mat:'PG',           color:'білий',      spoolId:'large',holderType:'stand',totalG:totalFromPct(50, 'large','stand')},
  {id:genId(),num:'734', model:'Modix 120Z',    mat:'PG',           color:'білий',      spoolId:'large',holderType:'stand',totalG:totalFromPct(50, 'large','stand')},
  {id:genId(),num:'766', model:'Bambu Lab P1S', mat:'PG',           color:'білий',      spoolId:'large',holderType:'stand',totalG:totalFromPct(50, 'large','stand')},
  {id:genId(),num:'772', model:'Bambu Lab P1P', mat:'PG',           color:'темно-сірий',spoolId:'large',holderType:'stand',totalG:totalFromPct(80, 'large','stand')},
  {id:genId(),num:'833', model:'Modix 120Z',    mat:'Полікарбонат', color:'прозорий',   spoolId:'large',holderType:'stand',totalG:totalFromPct(75, 'large','stand')},
];

const LS_KEY = 'filament_data_v5';
let printers = [], savedAt = null;

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const obj = JSON.parse(raw);
      if(obj.printers) { printers=obj.printers; savedAt=obj.savedAt||null; if(obj.cfg) CFG=obj.cfg; return true; }
    }
  } catch(e){}
  return false;
}
function saveToStorage() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({savedAt,printers,cfg:CFG})); } catch(e){}
}

let activeFilter='all', searchQ='', editIdx=null, isNewPrinter=false;
let currentSpoolId=null, currentHolderId=null;

/* ── Toast ── */
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

/* ── Date banner ── */
function showBanner() {
  const b=document.getElementById('date-banner');
  if(savedAt){ b.innerHTML='📅 Актуально на: <b>'+fmtDT(savedAt)+'</b>'; b.style.display='block'; }
  else b.style.display='none';
}

/* ── Save/load JSON ── */
function saveJSON() {
  savedAt=new Date().toISOString(); saveToStorage();
  const blob=new Blob([JSON.stringify({savedAt,printers,cfg:CFG},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='filament_data.json'; a.click(); URL.revokeObjectURL(a.href);
  showBanner(); showToast('Збережено — '+fmtDT(savedAt));
}
function loadJSON(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try {
      const obj=JSON.parse(ev.target.result);
      if(obj.printers&&Array.isArray(obj.printers)){ printers=obj.printers; savedAt=obj.savedAt||null; if(obj.cfg)CFG=obj.cfg; }
      else if(Array.isArray(obj)){ printers=obj; savedAt=null; }
      else throw new Error();
      saveToStorage(); activeFilter='all';
      renderSettings(); renderFilters(); renderGrid(); showBanner();
      showToast('Завантажено'+(savedAt?' ('+fmtDT(savedAt)+')':''));
    } catch{ showToast('Помилка читання файлу'); }
  };
  reader.readAsText(file); e.target.value='';
}

/* ── Settings panel ── */
function toggleSettings() {
  const p=document.getElementById('settings-panel');
  p.classList.toggle('open');
}

function renderSettings() {
  renderCfgTags('models','cfg-models');
  renderCfgTags('mats','cfg-mats');
  renderCfgTags('colors','cfg-colors');
  renderSpoolList();
  renderHolderList();
}

function renderCfgTags(key, elId) {
  document.getElementById(elId).innerHTML = CFG[key].map((v,i)=>
    `<span class="tag">${v}<button class="tag-del" onclick="removeCfgItem('${key}',${i})">×</button></span>`
  ).join('');
}

function addCfgItem(key, inputId, elId) {
  const inp=document.getElementById(inputId);
  const val=inp.value.trim(); if(!val)return;
  if(!CFG[key].includes(val)){ CFG[key].push(val); saveToStorage(); renderCfgTags(key,elId); }
  inp.value='';
}
function removeCfgItem(key,idx) {
  CFG[key].splice(idx,1); saveToStorage();
  renderSettings();
}

function renderSpoolList() {
  document.getElementById('cfg-spools').innerHTML = CFG.spools.map((s,i)=>
    `<div class="item-row"><span>${s.label} · макс ${s.maxNet} г</span><button class="item-del" onclick="removeSpool(${i})">×</button></div>`
  ).join('');
}
function addSpool() {
  const name=document.getElementById('new-spool-name').value.trim();
  const w=parseInt(document.getElementById('new-spool-w').value)||0;
  const mx=parseInt(document.getElementById('new-spool-max').value)||0;
  if(!name||!w||!mx)return;
  CFG.spools.push({id:genId(),label:`${name} · ${w} г`,weight:w,maxNet:mx});
  saveToStorage(); renderSpoolList();
  document.getElementById('new-spool-name').value='';
  document.getElementById('new-spool-w').value='';
  document.getElementById('new-spool-max').value='';
}
function removeSpool(i){ CFG.spools.splice(i,1); saveToStorage(); renderSpoolList(); }

function renderHolderList() {
  document.getElementById('cfg-holders').innerHTML = CFG.holders.map((h,i)=>
    `<div class="item-row"><span>${h.label}</span><button class="item-del" onclick="removeHolder(${i})">×</button></div>`
  ).join('');
}
function addHolder() {
  const name=document.getElementById('new-holder-name').value.trim();
  const w=parseInt(document.getElementById('new-holder-w').value)||0;
  if(!name||!w)return;
  CFG.holders.push({id:genId(),label:`${name} · ${w} г`,weight:w});
  saveToStorage(); renderHolderList();
  document.getElementById('new-holder-name').value='';
  document.getElementById('new-holder-w').value='';
}
function removeHolder(i){ CFG.holders.splice(i,1); saveToStorage(); renderHolderList(); }

/* ── Filters ── */
function getMaterials(){ return ['all',...new Set(printers.map(p=>p.mat))]; }
function renderFilters() {
  document.getElementById('filters').innerHTML=getMaterials().map(m=>
    `<button class="filter-btn ${activeFilter===m?'active':''}" onclick="setFilter('${m}')">${m==='all'?'Усі':m}</button>`
  ).join('');
}
function setFilter(m){ activeFilter=m; renderFilters(); renderGrid(); }
document.getElementById('search').addEventListener('input',e=>{ searchQ=e.target.value; renderGrid(); });

/* ── Stats ── */
function renderStats(data) {
  const nets=data.map(p=>netG(p.totalG,p.spoolId||'large',p.holderType||'stand'));
  const avgG=data.length?Math.round(nets.reduce((a,b)=>a+b,0)/data.length):0;
  const low=data.filter(p=>pctOf(p.totalG,p.spoolId||'large',p.holderType||'stand')<40).length;
  const full=data.filter(p=>pctOf(p.totalG,p.spoolId||'large',p.holderType||'stand')>=100).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-box"><div class="stat-label">Принтерів</div><div class="stat-val">${data.length}</div></div>
    <div class="stat-box"><div class="stat-label">Середній залишок</div><div class="stat-val">${avgG} г</div></div>
    <div class="stat-box"><div class="stat-label">Мало (&lt;40%)</div><div class="stat-val" style="color:${low>0?'#E24B4A':'inherit'}">${low}</div></div>
    <div class="stat-box"><div class="stat-label">Повні</div><div class="stat-val" style="color:#1D9E75">${full}</div></div>
  `;
}

/* ── Grid ── */
function renderGrid() {
  const q=searchQ.trim().toLowerCase();
  const filtered=printers.map((p,i)=>({...p,_i:i})).filter(p=>{
    const matchFilter=activeFilter==='all'||p.mat===activeFilter;
    const matchSearch=!q||p.num.includes(q)||(p.model||'').toLowerCase().includes(q);
    return matchFilter&&matchSearch;
  });
  renderStats(filtered);
  const g=document.getElementById('grid');
  if(!filtered.length){ g.innerHTML='<p style="color:#888;font-size:14px">Нічого не знайдено</p>'; return; }
  g.innerHTML=filtered.map(p=>{
    const mc=matColor(p.mat);
    const dot=colorDots[p.color]||'#aaa';
    const sid=p.spoolId||'large', hid=p.holderType||'stand';
    const sp=spoolById(sid), hd=holderById(hid);
    const fg=netG(p.totalG,sid,hid), pct=pctOf(p.totalG,sid,hid);
    return `<div class="card">
      <div class="card-top">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px;opacity:.2">🖨</span>
            <span class="printer-num">#${p.num}</span>
          </div>
          ${p.model?`<div class="printer-model">${p.model}</div>`:''}
          <span class="material-badge" style="background:${mc.bg};color:${mc.text}">${p.mat}</span><span class="spool-badge">${sp.label.split('·')[0].trim()} · ${hd.label.split('·')[0].trim()}</span>
        </div>
        <div class="card-actions">
          <button class="edit-btn" onclick="openModal(${p._i})">✏</button>
          <button class="del-btn" onclick="deletePrinter(${p._i})" title="Видалити">×</button>
        </div>
      </div>
      <div class="color-dot-row">
        <div class="color-dot" style="background:${dot}"></div>
        <span class="color-name">${p.color}</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>Філамент</span><span><span class="grams-big">${fg} г</span><span class="grams-pct">${pct}%</span></span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div>
      </div>
    </div>`;
  }).join('');
}

/* ── Delete printer ── */
function deletePrinter(idx) {
  if(!confirm(`Видалити принтер #${printers[idx].num}?`))return;
  printers.splice(idx,1); saveToStorage(); renderFilters(); renderGrid();
  showToast('Принтер видалено');
}

/* ── Modal helpers ── */
function buildSegment(containerId, items, currentId, setter) {
  document.getElementById(containerId).innerHTML=items.map(item=>
    `<button id="seg-${containerId}-${item.id}" class="${item.id===currentId?'active':''}" onclick="${setter}('${item.id}')">${item.label}</button>`
  ).join('');
}

function buildSelect(elId, options, currentVal) {
  const sel=document.getElementById(elId);
  sel.innerHTML=options.map(o=>`<option value="${o}" ${o===currentVal?'selected':''}>${o}</option>`).join('');
}

function setSegSpool(id) {
  currentSpoolId=id;
  CFG.spools.forEach(s=>{ const b=document.getElementById(`seg-seg-spool-${s.id}`); if(b)b.classList.toggle('active',s.id===id); });
  updateTareInfo(); updateCalcHint();
}
function setSegHolder(id) {
  currentHolderId=id;
  CFG.holders.forEach(h=>{ const b=document.getElementById(`seg-seg-holder-${h.id}`); if(b)b.classList.toggle('active',h.id===id); });
  updateTareInfo(); updateCalcHint();
}

function updateTareInfo() {
  const sp=spoolById(currentSpoolId), hd=holderById(currentHolderId);
  document.getElementById('tare-info').textContent=`мінус ${sp.weight} г котушка + ${hd.weight} г тримач = ${sp.weight+hd.weight} г тара`;
}
function updateCalcHint() {
  const raw=parseInt(document.getElementById('edit-grams').value)||0;
  if(raw>0){
    const tare=getTare(currentSpoolId,currentHolderId), maxNet=getMaxNet(currentSpoolId);
    const fg=Math.max(0,raw-tare), pct=Math.min(100,Math.round(fg/maxNet*100));
    document.getElementById('calc-hint').textContent=`→ ${fg} г філаменту (${pct}% від ${maxNet} г)`;
  } else document.getElementById('calc-hint').textContent='';
}
document.getElementById('edit-grams').addEventListener('input',updateCalcHint);

/* ── Open modal for editing ── */
function openModal(idx) {
  editIdx=idx; isNewPrinter=false;
  const p=printers[idx];
  document.getElementById('modal-title').textContent='Принтер #'+p.num;
  document.getElementById('modal-save-btn').textContent='Зберегти';
  document.getElementById('edit-num').value=p.num;
  buildSelect('edit-model', CFG.models, p.model||CFG.models[0]);
  currentSpoolId=p.spoolId||CFG.spools[0].id;
  currentHolderId=p.holderType||CFG.holders[0].id;
  buildSegment('seg-spool', CFG.spools, currentSpoolId, 'setSegSpool');
  buildSegment('seg-holder', CFG.holders, currentHolderId, 'setSegHolder');
  buildSelect('edit-mat', CFG.mats, p.mat);
  buildSelect('edit-color', CFG.colors, p.color);
  document.getElementById('edit-grams').value=p.totalG;
  updateTareInfo(); updateCalcHint();
  document.getElementById('overlay').classList.add('open');
}

/* ── Open modal for new printer ── */
function openAddPrinter() {
  editIdx=null; isNewPrinter=true;
  document.getElementById('modal-title').textContent='Новий принтер';
  document.getElementById('modal-save-btn').textContent='Додати';
  document.getElementById('edit-num').value='';
  buildSelect('edit-model', CFG.models, CFG.models[0]);
  currentSpoolId=CFG.spools[0].id;
  currentHolderId=CFG.holders[0].id;
  buildSegment('seg-spool', CFG.spools, currentSpoolId, 'setSegSpool');
  buildSegment('seg-holder', CFG.holders, currentHolderId, 'setSegHolder');
  buildSelect('edit-mat', CFG.mats, CFG.mats[0]);
  buildSelect('edit-color', CFG.colors, CFG.colors[0]);
  document.getElementById('edit-grams').value='';
  document.getElementById('tare-info').textContent='';
  document.getElementById('calc-hint').textContent='';
  updateTareInfo();
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editIdx=null; }

function saveEdit() {
  const num=document.getElementById('edit-num').value.trim();
  if(!num){ showToast('Введіть номер принтера'); return; }
  const entry = {
    id: isNewPrinter ? genId() : (printers[editIdx]?.id||genId()),
    num,
    model: document.getElementById('edit-model').value,
    mat:   document.getElementById('edit-mat').value,
    color: document.getElementById('edit-color').value,
    spoolId:    currentSpoolId,
    holderType: currentHolderId,
    totalG: parseInt(document.getElementById('edit-grams').value)||0,
  };
  if(isNewPrinter) printers.push(entry);
  else printers[editIdx]=entry;
  saveToStorage(); closeModal(); renderFilters(); renderGrid();
  showToast(isNewPrinter ? 'Принтер додано ✓' : 'Збережено ✓');
}

document.getElementById('overlay').addEventListener('click',function(e){ if(e.target===this)closeModal(); });

/* ── Init ── */
if(!loadFromStorage()){ printers=JSON.parse(JSON.stringify(DEFAULT_PRINTERS)); }
renderSettings(); showBanner(); renderFilters(); renderGrid();
</script>
</body>
</html>
